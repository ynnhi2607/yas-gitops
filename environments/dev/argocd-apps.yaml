apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: yas-dev-services
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - service: yas-configuration
            wave: "0"
          - service: product
            wave: "1"
          - service: cart
            wave: "1"
          - service: order
            wave: "1"
          - service: customer
            wave: "1"
          - service: inventory
            wave: "1"
          - service: tax
            wave: "1"
          - service: media
            wave: "1"
          - service: search
            wave: "1"
          - service: sampledata
            wave: "2"
          - service: storefront-bff
            wave: "2"
          - service: backoffice-bff
            wave: "2"
          - service: storefront-ui
            wave: "2"
          - service: backoffice-ui
            wave: "2"
          - service: swagger-ui
            wave: "3"
  template:
    metadata:
      name: yas-dev-{{service}}
      labels:
        app.kubernetes.io/part-of: yas-dev
      annotations:
        argocd.argoproj.io/sync-wave: '{{wave}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/ynnhi2607/yas-gitops.git
        targetRevision: main
        path: charts/{{service}}
        helm:
          ignoreMissingValueFiles: true
          valueFiles:
            - ../../environments/dev/services/{{service}}.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: yas-dev
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jqPathExpressions:
            - '.spec.template.spec.containers[]? | select(.name == "istio-proxy")'
            - '.spec.template.spec.initContainers[]? | select(.name == "istio-init")'
            - '.spec.template.spec.volumes[]? | select(.name | startswith("istio-"))'
            - '.spec.template.metadata.annotations."istio.io/rev"'
            - '.spec.template.metadata.annotations."sidecar.istio.io/status"'
            - '.spec.template.metadata.annotations."kubectl.kubernetes.io/default-container"'
            - '.spec.template.metadata.annotations."kubectl.kubernetes.io/default-logs-container"'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        managedNamespaceMetadata:
          labels:
            istio-injection: enabled
        syncOptions:
          - CreateNamespace=true
          - RespectIgnoreDifferences=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-istio-configs
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: yas-dev
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/ynnhi2607/yas-gitops.git
    targetRevision: main
    path: infrastructure/istio-configs
    helm:
      valueFiles:
        - ../../environments/dev/istio-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
