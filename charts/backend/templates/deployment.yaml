apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.deployment.annotations | nindent 4 }}
    {{- if .Values.deployment.extraAnnotations }}
      {{- toYaml .Values.deployment.extraAnnotations | nindent 4 }}
    {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "backend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.telemetry.openTelemetryJavaAgent.enabled .Values.initContainers .Values.extraInitContainers }}
      initContainers:
        {{- if .Values.telemetry.openTelemetryJavaAgent.enabled }}
        - name: otel-javaagent
          image: "{{ .Values.telemetry.openTelemetryJavaAgent.image.repository }}:{{ .Values.telemetry.openTelemetryJavaAgent.image.tag }}"
          imagePullPolicy: {{ .Values.telemetry.openTelemetryJavaAgent.image.pullPolicy }}
          command:
            - cp
            - /javaagent.jar
            - /otel-auto-instrumentation/javaagent.jar
          volumeMounts:
            - name: otel-auto-instrumentation
              mountPath: /otel-auto-instrumentation
        {{- end }}
        {{- if .Values.initContainers }}
        {{- tpl (toYaml .Values.initContainers) . | nindent 8 }}
        {{- end }}
        {{- if .Values.extraInitContainers }}
        {{- tpl (toYaml .Values.extraInitContainers) . | nindent 8 }}
        {{- end }}
      {{- end }}
      volumes:
        - name: yas-configuration
          configMap:
            name: yas-configuration-configmap
        {{- if .Values.telemetry.openTelemetryJavaAgent.enabled }}
        - name: otel-auto-instrumentation
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes}}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      containers:
        - name: {{ include "backend.fullname" . }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          {{- if or (eq (toString .Values.image.tag) "main") (eq (toString .Values.image.tag) "latest") }}
          imagePullPolicy: Always
          {{- else }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- end }}
          envFrom:
            - secretRef:
                name: yas-postgresql-credentials-secret
            {{- with .Values.extraEnvFroms }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: LOGGING_CONFIG
              value: {{ .Values.logbackXmlPath }}
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.databaseConnectionUrl }}/{{ .Values.databaseName }}
            {{- if .Values.extraApplicationConfigPaths }}
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: /opt/yas/config/application.yaml,{{ join "," .Values.extraApplicationConfigPaths }}
            {{- else }}
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: /opt/yas/config/application.yaml
            {{- end }}
            {{- if .Values.telemetry.openTelemetryJavaAgent.enabled }}
            - name: JAVA_TOOL_OPTIONS
              value: -javaagent:/otel-auto-instrumentation/javaagent.jar
            - name: OTEL_SERVICE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/name']
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.telemetry.openTelemetryJavaAgent.exporterEndpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_TRACES_EXPORTER
              value: {{ .Values.telemetry.openTelemetryJavaAgent.tracesExporter | quote }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ .Values.telemetry.openTelemetryJavaAgent.metricsExporter | quote }}
            - name: OTEL_LOGS_EXPORTER
              value: {{ .Values.telemetry.openTelemetryJavaAgent.logsExporter | quote }}
            - name: OTEL_PROPAGATORS
              value: {{ .Values.telemetry.openTelemetryJavaAgent.propagators | quote }}
            - name: OTEL_TRACES_SAMPLER
              value: {{ .Values.telemetry.openTelemetryJavaAgent.tracesSampler | quote }}
            - name: OTEL_INSTRUMENTATION_SPRING_DATA_ENABLED
              value: "false"
            {{- end }}
            {{- with .Values.extraEnvs }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - mountPath: /opt/yas/config
              name: yas-configuration
            {{- if .Values.telemetry.openTelemetryJavaAgent.enabled }}
            - mountPath: /otel-auto-instrumentation
              name: otel-auto-instrumentation
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.httpPort }}
              protocol: TCP
            - name: metric
              containerPort: {{ .Values.metricPort }}
          lifecycle:
            {{ toYaml .Values.lifecycle | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
