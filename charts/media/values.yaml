backend:
  image:
    repository: ynnhi2607/yas-media
    tag: latest
    pullPolicy: Always

  nameOverride: media
  fullnameOverride: media
  hostAliases:
    - ip: 34.118.233.225
      hostnames:
        - identity.yas.local.com
  databaseName: media
  ingress:
    enabled: false
  extraVolumes:
    - name: media-application
      configMap:
        name: media-application-configmap
    - name: media-images
      persistentVolumeClaim:
        claimName: media-images-pvc
  extraVolumeMounts:
    - name: media-application
      mountPath: /opt/yas/media
    - name: media-images
      mountPath: /images
  extraApplicationConfigPaths:
    - /opt/yas/media/media-application.yaml
  extraInitContainers:
    - name: seed-sample-images
      image: ynnhi2607/yas-media:latest
      command:
        - sh
        - -c
        - |
          set -eu
          if [ -d /images ] && [ ! -f /images-mount/sample/product/ip15/iphone15_thumbnail.jpg ]; then
            echo "Copying baseline media images..."
            cp -a /images/. /images-mount/
          else
            echo "Baseline images already exist or /images is missing."
          fi
      volumeMounts:
        - name: media-images
          mountPath: /images-mount
  extraObjects:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: media-images-pvc
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
