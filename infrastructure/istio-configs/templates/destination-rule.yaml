---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: elasticsearch-no-tls
  namespace: {{ .Values.namespace }}
spec:
  host: "*.elasticsearch.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: DISABLE
