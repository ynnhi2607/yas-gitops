{{- $storefrontHosts := prepend (.Values.hosts.storefrontAliases | default list) .Values.hosts.storefront -}}
{{- $backofficeHosts := prepend (.Values.hosts.backofficeAliases | default list) .Values.hosts.backoffice -}}
{{- $apiHosts := prepend (.Values.hosts.apiAliases | default list) .Values.hosts.api -}}
{{- $storefrontAuthority := printf "^(%s)(:[0-9]+)?$" (join "|" $storefrontHosts) -}}
{{- $backofficeAuthority := printf "^(%s)(:[0-9]+)?$" (join "|" $backofficeHosts) -}}
{{- $apiAuthority := printf "^(%s)(:[0-9]+)?$" (join "|" $apiHosts) -}}
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: yas-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: yas-service-mesh
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - {{ .Values.hosts.storefront }}
{{- range .Values.hosts.storefrontAliases }}
        - {{ . }}
{{- end }}
        - {{ .Values.hosts.backoffice }}
{{- range .Values.hosts.backofficeAliases }}
        - {{ . }}
{{- end }}
        - {{ .Values.hosts.api }}
{{- range .Values.hosts.apiAliases }}
        - {{ . }}
{{- end }}
        - {{ .Values.identity.host }}
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: yas-web
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: yas-service-mesh
spec:
  hosts:
    - {{ .Values.hosts.storefront }}
    - {{ .Values.hosts.backoffice }}
    - {{ .Values.hosts.api }}
{{- range .Values.hosts.storefrontAliases }}
    - {{ . }}
{{- end }}
{{- range .Values.hosts.backofficeAliases }}
    - {{ . }}
{{- end }}
{{- range .Values.hosts.apiAliases }}
    - {{ . }}
{{- end }}
  gateways:
    - yas-gateway
  http:
    - match:
        - authority:
            regex: '{{ $storefrontAuthority }}'
          uri:
            prefix: /_next
        - authority:
            regex: '{{ $storefrontAuthority }}'
          uri:
            prefix: /favicon.ico
        - authority:
            regex: '{{ $storefrontAuthority }}'
          uri:
            prefix: /images
      route:
        - destination:
            host: storefront-ui.{{ .Values.namespace }}.svc.cluster.local
            port:
              number: 3000
      timeout: {{ .Values.timeouts.default }}
    - match:
        - authority:
            regex: '{{ $storefrontAuthority }}'
          uri:
            prefix: /api
        - authority:
            regex: '{{ $storefrontAuthority }}'
          uri:
            prefix: /oauth2
        - authority:
            regex: '{{ $storefrontAuthority }}'
          uri:
            prefix: /login
        - authority:
            regex: '{{ $storefrontAuthority }}'
          uri:
            prefix: /logout
        - authority:
            regex: '{{ $storefrontAuthority }}'
          uri:
            prefix: /authentication
      route:
        - destination:
            host: storefront-bff.{{ .Values.namespace }}.svc.cluster.local
            port:
              number: 80
      timeout: {{ .Values.timeouts.default }}
      retries:
        attempts: {{ .Values.retry.attempts }}
        perTryTimeout: {{ .Values.timeouts.retryPerTry }}
        retryOn: 5xx,reset,connect-failure
    - match:
        - authority:
            regex: '{{ $storefrontAuthority }}'
      route:
        - destination:
            host: storefront-ui.{{ .Values.namespace }}.svc.cluster.local
            port:
              number: 3000
      timeout: {{ .Values.timeouts.default }}
    - match:
        - authority:
            regex: '{{ $backofficeAuthority }}'
          uri:
            prefix: /_next
        - authority:
            regex: '{{ $backofficeAuthority }}'
          uri:
            prefix: /favicon.ico
        - authority:
            regex: '{{ $backofficeAuthority }}'
          uri:
            prefix: /images
      route:
        - destination:
            host: backoffice-ui.{{ .Values.namespace }}.svc.cluster.local
            port:
              number: 3000
      timeout: {{ .Values.timeouts.default }}
    - match:
        - authority:
            regex: '{{ $backofficeAuthority }}'
          uri:
            prefix: /api
        - authority:
            regex: '{{ $backofficeAuthority }}'
          uri:
            prefix: /oauth2
        - authority:
            regex: '{{ $backofficeAuthority }}'
          uri:
            prefix: /login
        - authority:
            regex: '{{ $backofficeAuthority }}'
          uri:
            prefix: /logout
        - authority:
            regex: '{{ $backofficeAuthority }}'
          uri:
            prefix: /authentication
      route:
        - destination:
            host: backoffice-bff.{{ .Values.namespace }}.svc.cluster.local
            port:
              number: 80
      timeout: {{ .Values.timeouts.default }}
      retries:
        attempts: {{ .Values.retry.attempts }}
        perTryTimeout: {{ .Values.timeouts.retryPerTry }}
        retryOn: 5xx,reset,connect-failure
    - match:
        - authority:
            regex: '{{ $backofficeAuthority }}'
      route:
        - destination:
            host: backoffice-ui.{{ .Values.namespace }}.svc.cluster.local
            port:
              number: 3000
      timeout: {{ .Values.timeouts.default }}
    - match:
        - authority:
            regex: '{{ $apiAuthority }}'
          uri:
            prefix: /media
      route:
        - destination:
            host: media.{{ .Values.namespace }}.svc.cluster.local
            port:
              number: 80
      timeout: {{ .Values.timeouts.default }}
    - match:
        - authority:
            regex: '{{ $apiAuthority }}'
          uri:
            prefix: /swagger-ui
      route:
        - destination:
            host: {{ .Values.services.swaggerService }}.{{ .Values.namespace }}.svc.cluster.local
            port:
              number: 8080
      timeout: {{ .Values.timeouts.default }}
    - match:
        - authority:
            regex: '{{ $apiAuthority }}'
      route:
        - destination:
            host: storefront-bff.{{ .Values.namespace }}.svc.cluster.local
            port:
              number: 80
      timeout: {{ .Values.timeouts.default }}
{{ if .Values.identity.enabled }}
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: identity-web
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: yas-service-mesh
spec:
  hosts:
    - {{ .Values.identity.host }}
  gateways:
    - yas-gateway
  http:
    - match:
        - authority:
            exact: {{ .Values.identity.host }}
      route:
        - destination:
            host: {{ .Values.identity.serviceHost }}
            port:
              number: {{ .Values.identity.servicePort }}
      timeout: {{ .Values.timeouts.default }}
{{ end }}
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: tax-retry
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: yas-service-mesh
spec:
  hosts:
    - tax
    - tax.{{ .Values.namespace }}.svc.cluster.local
  http:
    - route:
        - destination:
            host: tax.{{ .Values.namespace }}.svc.cluster.local
            port:
              number: 80
      timeout: {{ .Values.timeouts.default }}
      retries:
        attempts: {{ .Values.retry.attempts }}
        perTryTimeout: {{ .Values.timeouts.retryPerTry }}
        retryOn: 5xx,retriable-4xx,connect-failure,reset
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: product-retry
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: yas-service-mesh
spec:
  hosts:
    - product
    - product.{{ .Values.namespace }}.svc.cluster.local
  http:
    - route:
        - destination:
            host: product.{{ .Values.namespace }}.svc.cluster.local
            port:
              number: 80
      timeout: {{ .Values.timeouts.default }}
      retries:
        attempts: {{ .Values.retry.attempts }}
        perTryTimeout: {{ .Values.timeouts.retryPerTry }}
        retryOn: 5xx,connect-failure,reset
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: elasticsearch-header-fix
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: yas-service-mesh
spec:
  hosts:
    - elasticsearch-es-http.elasticsearch.svc.cluster.local
    - elasticsearch-es-http.elasticsearch
  http:
    - match:
        - method:
            regex: '^(HEAD|GET)$'
      route:
        - destination:
            host: elasticsearch-es-http.elasticsearch.svc.cluster.local
            port:
              number: 9200
      headers:
        request:
          set:
            Accept: application/json
          remove:
            - Content-Type
    - route:
        - destination:
            host: elasticsearch-es-http.elasticsearch.svc.cluster.local
            port:
              number: 9200
      headers:
        request:
          set:
            Accept: application/json
            Content-Type: application/json
