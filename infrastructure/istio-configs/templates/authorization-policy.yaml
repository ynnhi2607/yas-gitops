{{- range .Values.services.public }}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-public-{{ . }}
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/part-of: yas-service-mesh
spec:
  action: ALLOW
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ . }}
  rules:
    - {}
---
{{- end }}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-health-checks
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: yas-service-mesh
spec:
  action: ALLOW
  rules:
    - to:
        - operation:
            paths:
              - /
              - /health
              - /actuator/health
              - /actuator/health/*
              - /actuator/prometheus
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-to-product
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: yas-service-mesh
spec:
  action: ALLOW
  selector:
    matchLabels:
      app.kubernetes.io/name: product
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/{{ .Values.namespace }}/sa/storefront-bff
              - cluster.local/ns/{{ .Values.namespace }}/sa/backoffice-bff
              - cluster.local/ns/{{ .Values.namespace }}/sa/cart
              - cluster.local/ns/{{ .Values.namespace }}/sa/order
              - cluster.local/ns/{{ .Values.namespace }}/sa/search
              - cluster.local/ns/{{ .Values.namespace }}/sa/inventory
---
apiVersion: security.istio.io/v1
