apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: observability
  labels:
    app.kubernetes.io/name: promtail
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
  labels:
    app.kubernetes.io/name: promtail
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
      - namespaces
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
  labels:
    app.kubernetes.io/name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: observability
  labels:
    app.kubernetes.io/name: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 3101
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: yas-pod-logs
        pipeline_stages:
          - cri: {}
        static_configs:
          - targets: [localhost]
            labels:
              job: podlogs
              namespace: yas
              __path__: /var/log/pods/yas_*/*/*.log
          - targets: [localhost]
            labels:
              job: podlogs
              namespace: yas-dev
              __path__: /var/log/pods/yas-dev_*/*/*.log
          - targets: [localhost]
            labels:
              job: podlogs
              namespace: yas-staging
              __path__: /var/log/pods/yas-staging_*/*/*.log
          - targets: [localhost]
            labels:
              job: podlogs
              namespace: keycloak
              __path__: /var/log/pods/keycloak_*/*/*.log
          - targets: [localhost]
            labels:
              job: podlogs
              namespace: argocd
              __path__: /var/log/pods/argocd_*/*/*.log
          - targets: [localhost]
            labels:
              job: podlogs
              namespace: istio-system
              __path__: /var/log/pods/istio-system_*/*/*.log
          - targets: [localhost]
            labels:
              job: podlogs
              namespace: observability
              __path__: /var/log/pods/observability_*/*/*.log
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: observability
  labels:
    app.kubernetes.io/name: promtail
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promtail
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:2.9.8
          args:
            - -config.file=/etc/promtail/promtail.yaml
          ports:
            - name: http-metrics
              containerPort: 3101
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: run
              mountPath: /run/promtail
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: run
          emptyDir: {}
        - name: pods
          hostPath:
            path: /var/log/pods
---
apiVersion: v1
kind: Service
metadata:
  name: promtail
  namespace: observability
  labels:
    app.kubernetes.io/name: promtail
    app: promtail
spec:
  type: ClusterIP
  selector:
    app: promtail
  ports:
    - name: http-metrics
      port: 3101
      targetPort: http-metrics
