{{- range .Values.services.public }}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-public-{{ . }}
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/part-of: yas-service-mesh
spec:
  action: ALLOW
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ . }}
  rules:
    - from:
        - source:
            principals:
{{- range $.Values.gateway.principals }}
              - {{ . }}
{{- end }}
---
{{- end }}
{{- $swaggerDocsServices := list "product" "cart" "customer" "order" "inventory" "location" "media" "payment" "tax" "search" }}
{{- range $service := $swaggerDocsServices }}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-{{ $service }}-api-docs
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/part-of: yas-service-mesh
spec:
  action: ALLOW
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $service }}
  rules:
    - from:
        - source:
            principals:
{{- range $.Values.gateway.principals }}
              - {{ . }}
{{- end }}
      to:
        - operation:
            paths:
              - /{{ $service }}/v3/api-docs
              - /{{ $service }}/v3/api-docs/*
---
{{- end }}
